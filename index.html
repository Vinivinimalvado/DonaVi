<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia das Mães 💗</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="rain" id="rain"></div>

<div class="card">
    <div class="carousel">
        <!-- As imagens serão controladas pelo JS -->
        <img src="mae1.jpg" class="active" alt="Momento 1">
    </div>

    <h2>Mãe 💖</h2>
    <p>Um pequeno presente feito com muito amor</p>

    <div class="buttons">
        <button id="btn1">Mensagens 💐</button>
        <button id="btn2">Nossa história 💗</button>
    </div>
</div>

<div class="message-box" id="msgBox">
    <h3>Para você, mãe 💖</h3>
    <p>Você é meu maior exemplo de amor, força e cuidado.</p>
    <button onclick="closeMsg()">Fechar</button>
</div>

<script src="script.js"></script>
</body>
</html>
