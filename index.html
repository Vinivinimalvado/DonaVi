<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia das Mães 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <div class="carousel">
        <img src="mae1.jpg" class="active">
        <img src="mae2.jpg">
        <img src="mae3.jpg">
        <img src="mae4.jpg">
        <img src="mae5.jpg">
        <img src="mae6.jpg">
        <img src="mae7.jpg">
        <img src="mae8.jpg">
        <img src="mae9.jpg">
        <img src="mae10.jpg">
    </div>

    <h2>Mamãe 💖</h2>
    <p id="daysCounter"></p>

    <div class="buttons">
        <button id="btn1">Mensagem 💌</button>
        <button id="btn2">Quando estiver triste</button>
    </div>
</div>

<div class="message-box" id="msgBox">
    <div class="msg-content">
        <h3 id="msgTitle"></h3>
        <p id="msgText"></p>
        <button onclick="closeMsg()">Fechar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
