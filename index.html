<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia das Mães 💐</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="rain" id="rain"></div>

<div class="card">
    <div class="carousel">
        <img src="mae1.jpg" class="active" alt="Momento especial 1">
        <img src="mae2.jpg" alt="Momento especial 2">
        <img src="mae3.jpg" alt="Momento especial 3">
    </div>

    <h2>Dona Vi 💖</h2>
    <p>Algumas lembranças e sentimentos que vêm do coração</p>

    <div class="buttons">
        <button id="btn1">Mensagens 💐</button>
        <button id="btn2">Quando você precisar de mim</button>
    </div>
</div>

<div class="message-box" id="msgBox">
    <h3>Para você, mãe 💖</h3>
    <p>
        Obrigado por tudo o que você faz por mim todos os dias.  
        Pelo amor, pela força, pelo cuidado e por nunca desistir.  
        Eu te amo mais do que consigo explicar. 💐
    </p>
    <button onclick="closeMsg()">Fechar</button>
</div>

<script src="script.js"></script>
</body>
</html>
